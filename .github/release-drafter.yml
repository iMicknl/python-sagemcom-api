name-template: 'v$NEXT_PATCH_VERSION'
tag-template: 'v$NEXT_PATCH_VERSION'
categories:
  - title: '⚠️ Breaking changes'
    when:
      label: 'breaking'
  - title: '🚀 Features'
    when:
      label: 'feature'
  - title: '✨ Enhancement'
    when:
      label: 'enhancement'
  - title: '📘 Documentation'
    when:
      label: 'documentation'
  - title: '🐛 Bug Fixes'
    when:
      label: 'bug'
  - title: '📦 Dependencies'
    when:
      label: 'dependencies'
  - type: 'pre-exclude'
    when:
      label: 'exclude-from-changelog'

autolabeler:
  - label: 'feature'
    branch:
      - '/^feature\//'
      - '/^feat\//'
  - label: 'enhancement'
    branch:
      - '/^enhancement\//'
  - label: 'bug'
    branch:
      - '/^fix\//'
  - label: 'breaking'
    branch:
      - '/^breaking\//'
  - label: 'documentation'
    branch:
      - '/^doc\//'

template: |
  ## What's changed
  $CHANGES

  ## Contributors to this release
  $CONTRIBUTORS
